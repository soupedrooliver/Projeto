<!doctype html>
<html lang="en" class="">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLinks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img src="./assets/Abstract Identity.jpg" alt="Profile Pic." />
        <p>@PedroDev</p>
      </div>

      <div id="switch" onclick="togglemode()">
        <button></button>
        <span> </span>
      </div>

      <ul>
        <li>
          <a href="#" target="_blank">Me Siga</a>
        </li>

        <li>
          <a href="#" target="_blank">Comunidade</a>
        </li>
        <li>
          <a href="#" target="_blank">Ver meu portfólio</a>
        </li>
        <li>
          <a href="#" target="_blank">Sobre Mim</a>
        </li>
      </ul>
      <div id="social-links">
        <a href="github.com" target="_blank"
          ><ion-icon name="logo-github"></ion-icon>
        </a>
        <a href="instagram.com" target="_blank"
          ><ion-icon name="logo-instagram"></ion-icon>
        </a>
        <a href="x.com" target="_blank"
          ><ion-icon name="logo-twitter"></ion-icon>
        </a>
        <a href="linkedin.com" target="_blank"
          ><ion-icon name="logo-linkedin"></ion-icon>
        </a>
      </div>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="script.js"></script>
  </body>
  <footer>
    <p id="footer">
      Feito com <ion-icon name="heart"></ion-icon> por
      <a href="#" target="_blank">Pedro Vinícius</a>
    </p>
  </footer>
</html>
